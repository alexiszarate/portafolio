<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Documentos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        header h2 {
            margin: 0;
            font-size: 16px;
            font-style: italic;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
        }

        form label {
            font-weight: bold;
        }

        form input, form button {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        form button {
            background-color: #27ae60;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border: none;
        }

        form button:hover {
            background-color: #219150;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        table th {
            background-color: #34495e;
            color: white;
        }

        table tr:nth-child(even) {
            background-color: #f4f4f9;
        }

        table tr:hover {
            background-color: #ecf0f1;
        }

        /* Ajustar ancho de columnas */
        table th:nth-child(1), table td:nth-child(1) {
            width: 15%; /* Tipo de documento */
        }

        table th:nth-child(4), table td:nth-child(4) {
            width: 40%; /* Nombre */
        }

        table th:nth-child(2), table td:nth-child(2),
        table th:nth-child(3), table td:nth-child(3) {
            width: 22.5%; /* Fechas */
        }
    </style>
</head>
<body>
    <header>
        <h1>GRUPO INDUSTRIAL HMI</h1>
        <h2>AL SERVICIO DE LA INDUSTRIA</h2>
    </header>

    <div class="container">
        <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
            <label for="documento">Subir documento:</label>
            <input type="file" name="documento" id="documento" required>

            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" required>

            <label for="tipo_documento">Tipo de documento:</label>
            <input type="text" name="tipo_documento" id="tipo_documento" required>

            <label for="fecha_emision">Fecha de emisión (YYYY-MM-DD):</label>
            <input type="date" name="fecha_emision" id="fecha_emision" required>

            <label for="fecha_caducidad">Fecha de caducidad (YYYY-MM-DD):</label>
            <input type="date" name="fecha_caducidad" id="fecha_caducidad" required>

            <button type="submit">Subir Documento</button>
        </form>

        <h3>Documentos Registrados</h3>
        <table>
            <thead>
                <tr>
                    <th>Tipo de Documento</th>
                    <th>Fecha de Emisión</th>
                    <th>Fecha de Caducidad</th>
                    <th>Nombre</th>
                </tr>
            </thead>
            <tbody>
                {% for doc in documentos %}
                <tr>
                    <td>{{ doc[2] }}</td>
                    <td>{{ doc[4] }}</td>
                    <td>{{ doc[5] }}</td>
                    <td>{{ doc[1] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
